name: Despliegue Continuo Control-M  # Nombre del workflow

on:  # Triggers: qué lo activa
  push:  # Al pushear cambios
    branches: [ main ]  # Solo en rama main
  pull_request:  # Opcional: también en PRs para validación
    branches: [ main ]

jobs:  # Secciones del pipeline
  validate:  # Job 1: Validar sintaxis
    runs-on: ubuntu-latest  # Máquina virtual (Linux)
    steps:
    - uses: actions/checkout@v4  # Paso: Clona el repo

    - name: Instalar CLI de Control-M
      run: |  # Instala ctm CLI
        curl -s https://controlm.github.io/ctm-cli/install.sh | bash

    - name: Validar Jobs
      run: |  # Valida todos los JSON en /jobs
        ctm build jobs/*.json

  test:  # Job 2: Probar jobs (opcional, requiere entorno test)
    needs: validate  # Espera a que validate termine
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Instalar CLI de Control-M
      run: curl -s https://controlm.github.io/ctm-cli/install.sh | bash

    - name: Configurar Entorno Test
      run: |  # Configura API para test
        ctm env add test ${{ secrets.CTM_ENDPOINT }} ${{ secrets.CTM_USER }} ${{ secrets.CTM_PASS }}
        ctm env set test

    - name: Desplegar y Ejecutar en Test
      run: |  # Despliega y corre un test
        ctm deploy jobs/*.json
        ctm run jobs/*.json  # Ejecuta y verifica (puedes agregar checks)

  deploy:  # Job 3: Desplegar a Producción
    needs: test  # Espera a que test termine (o validate si omites test)
    if: github.ref == 'refs/heads/main'  # Solo en push a main, no en PRs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Instalar CLI de Control-M
      run: curl -s https://controlm.github.io/ctm-cli/install.sh | bash

    - name: Configurar Entorno Prod
      run: |  # Configura API para prod
        ctm env add prod ${{ secrets.CTM_ENDPOINT }} ${{ secrets.CTM_USER }} ${{ secrets.CTM_PASS }}
        ctm env set prod

    - name: Desplegar a Producción
      run: |  # Despliega final
        ctm deploy jobs/*.json
